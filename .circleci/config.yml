version: 2.1

parameters:
  snyk-scan-context:
    description: CircleCI context that provides SNYK_TOKEN to Snyk security scanning.
    type: string
    # TODO(pkey): rename ai-bom context or create a shared one for the team
    default: ai-bom

orbs:
  go: circleci/go@1.7.1
  prodsec: snyk/prodsec-orb@1

jobs:
  unit-test:
    executor:
      name: go/default
      tag: "1.24"
    steps:
      - checkout
      - go/load-cache
      - go/mod-download
      - go/save-cache
      - go/test:
          covermode: atomic
          failfast: true
          race: true
  lint:
    docker:
      - image: golangci/golangci-lint:v1.64.7-alpine
    steps:
      - checkout
      - run: golangci-lint run -v ./...

  setup-wizard-test:
    docker:
      - image: cimg/node:22.16
    steps:
      - checkout
      - run:
          name: Install dependencies
          command: cd web && npm ci
      - run:
          name: Run frontend tests
          command: cd web && npx vitest run

  pre-commit:
    docker:
      - image: cimg/go:1.24-node
    steps:
      - checkout
      - go/load-cache
      - go/mod-download
      - go/save-cache
      - run:
          name: Install uv
          command: curl -LsSf https://astral.sh/uv/install.sh | sh
      - run:
          name: Install tools
          command: make install-tools
      - run:
          name: Run pre-commit hooks
          command: |
            export PATH="$(pwd)/.bin/go:$(pwd)/.bin/python/bin:$PATH"
            pre-commit run --all-files
      - run:
          name: Verify no uncommitted changes
          command: |
            if ! git diff --quiet; then
              echo "Pre-commit hooks produced changes that were not committed:"
              git diff --stat
              exit 1
            fi

  security-scans:
    executor:
      name: go/default
      tag: "1.24"
    resource_class: small
    steps:
      - checkout
      - go/load-cache
      - go/mod-download
      - go/save-cache
      - prodsec/security_scans:
          mode: auto
          iac-scan: disabled

workflows:
  version: 2
  CI:
    jobs:
      - prodsec/secrets-scan:
          name: Scan repository for secrets
          context:
            - snyk-bot-slack
          channel: p-redteaming-alerts
      - security-scans:
          name: Security Scans
          context:
            - << pipeline.parameters.snyk-scan-context >>
      - unit-test:
          name: Unit Test
      - lint:
          name: Linting
      - setup-wizard-test:
          name: Setup Wizard Tests
      - pre-commit:
          name: Pre-commit Checks
