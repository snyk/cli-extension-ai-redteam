<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Red teaming report</title>
    <style>
      /* ===================================================================
       DESIGN TOKENS — Primitives (from your design system)
       =================================================================== */
      :root {
        --pcl-font-family-mono: "Geist Mono", ui-monospace, monospace;
        --pcl-font-family-sans:
          "Geist", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          sans-serif;

        --pcl-font-size-2xs: 12px;
        --pcl-font-size-xs: 13px;
        --pcl-font-size-sm: 14px;
        --pcl-font-size-base: 16px;
        --pcl-font-size-lg: 18px;
        --pcl-font-size-xl: 20px;
        --pcl-font-size-2xl: 24px;

        --pcl-font-weight-normal: 400;
        --pcl-font-weight-medium: 500;
        --pcl-font-weight-semibold: 600;
        --pcl-font-weight-bold: 700;

        --pcl-font-line-height-xs: 20px;
        --pcl-font-line-height-sm: 24px;
        --pcl-font-line-height-base: 28px;

        --pcl-radius-sm: 4px;
        --pcl-radius-md: 6px;
        --pcl-radius-lg: 8px;
        --pcl-radius-xl: 12px;
        --pcl-radius-full: 9999px;

        --pcl-spacing-4: 4px;
        --pcl-spacing-6: 6px;
        --pcl-spacing-8: 8px;
        --pcl-spacing-10: 10px;
        --pcl-spacing-12: 12px;
        --pcl-spacing-16: 16px;
        --pcl-spacing-20: 20px;
        --pcl-spacing-24: 24px;
        --pcl-spacing-32: 32px;
        --pcl-spacing-40: 40px;
        --pcl-spacing-48: 48px;

        /* Color primitives */
        --pcl-color-primitives-black: #000000;
        --pcl-color-primitives-white: #ffffff;
        --pcl-color-primitives-neutral-50: #fafafa;
        --pcl-color-primitives-neutral-100: #f4f4f5;
        --pcl-color-primitives-neutral-200: #e4e4e7;
        --pcl-color-primitives-neutral-300: #d4d4d8;
        --pcl-color-primitives-neutral-400: #9f9fa9;
        --pcl-color-primitives-neutral-500: #71717b;
        --pcl-color-primitives-neutral-600: #52525c;
        --pcl-color-primitives-neutral-700: #3f3f46;
        --pcl-color-primitives-neutral-800: #27272a;
        --pcl-color-primitives-neutral-900: #18181b;
        --pcl-color-primitives-neutral-950: #09090b;
        --pcl-color-primitives-red-100: #ffe2e2;
        --pcl-color-primitives-red-200: #ffc9c9;
        --pcl-color-primitives-red-300: #ffa2a2;
        --pcl-color-primitives-red-500: #fb2c36;
        --pcl-color-primitives-red-700: #c10007;
        --pcl-color-primitives-red-800: #9f0712;
        --pcl-color-primitives-red-900: #82181a;
        --pcl-color-primitives-red-950: #460809;
        --pcl-color-primitives-orange-100: #ffedd4;
        --pcl-color-primitives-orange-200: #ffd6a8;
        --pcl-color-primitives-orange-300: #ffb86a;
        --pcl-color-primitives-orange-500: #ff6900;
        --pcl-color-primitives-orange-700: #ca3500;
        --pcl-color-primitives-orange-800: #9f2d00;
        --pcl-color-primitives-yellow-100: #fef9c2;
        --pcl-color-primitives-yellow-200: #fff085;
        --pcl-color-primitives-yellow-300: #ffdf20;
        --pcl-color-primitives-yellow-500: #efb100;
        --pcl-color-primitives-yellow-600: #d08700;
        --pcl-color-primitives-yellow-700: #a65f00;
        --pcl-color-primitives-yellow-800: #894b00;
        --pcl-color-primitives-blue-100: #bedbff;
        --pcl-color-primitives-blue-300: #8ec5ff;
        --pcl-color-primitives-blue-500: #2b7fff;
        --pcl-color-primitives-green-300: #7bf1a8;

        --pcl-color-primitives-white-alpha-1: rgba(255, 255, 255, 0.01);
        --pcl-color-primitives-white-alpha-6: rgba(255, 255, 255, 0.06);
        --pcl-color-primitives-white-alpha-8: rgba(255, 255, 255, 0.08);
        --pcl-color-primitives-white-alpha-12: rgba(255, 255, 255, 0.12);
      }

      /* ===================================================================
       SEMANTIC TOKENS — Dark theme
       =================================================================== */
      [data-theme="dark"] {
        --color-bg: var(--pcl-color-primitives-neutral-900);
        --color-bg-surface: var(--pcl-color-primitives-neutral-800);
        --color-bg-surface-secondary: var(--pcl-color-primitives-neutral-900);
        --color-bg-surface-tertiary: var(--pcl-color-primitives-neutral-950);

        --color-fg: var(--pcl-color-primitives-neutral-100);
        --color-fg-secondary: var(--pcl-color-primitives-neutral-300);
        --color-fg-tertiary: var(--pcl-color-primitives-neutral-400);
        --color-fg-muted: var(--pcl-color-primitives-neutral-500);
        --color-fg-caution: var(--pcl-color-primitives-yellow-600);

        --color-border: var(--pcl-color-primitives-neutral-700);
        --color-border-secondary: var(--pcl-color-primitives-neutral-600);

        --color-severity-critical-bg: var(--pcl-color-primitives-red-800);
        --color-severity-critical-fg: var(--pcl-color-primitives-red-100);
        --color-severity-high-bg: var(--pcl-color-primitives-orange-800);
        --color-severity-high-fg: var(--pcl-color-primitives-orange-100);
        --color-severity-medium-bg: var(--pcl-color-primitives-yellow-700);
        --color-severity-medium-fg: var(--pcl-color-primitives-yellow-100);
        --color-severity-low-bg: var(--pcl-color-primitives-neutral-600);
        --color-severity-low-fg: var(--pcl-color-primitives-neutral-200);

        --color-link: var(--pcl-color-primitives-blue-300);
        --color-link-hover: var(--pcl-color-primitives-blue-100);
        --color-accent: var(--pcl-color-primitives-blue-500);
      }

      /* ===================================================================
       RESET & BASE
       =================================================================== */
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: var(--pcl-font-family-sans);
        font-size: var(--pcl-font-size-sm);
        line-height: var(--pcl-font-line-height-sm);
        color: var(--color-fg);
        background-color: var(--color-bg);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      code,
      pre {
        font-family: var(--pcl-font-family-mono);
      }

      /* ===================================================================
       LAYOUT
       =================================================================== */
      .report-container {
        max-width: 1200px;
        margin: 0 auto;
        padding: var(--pcl-spacing-32) var(--pcl-spacing-24);
      }

      /* ===================================================================
       REPORT TITLE
       =================================================================== */
      .report-title {
        font-size: var(--pcl-font-size-2xl);
        font-weight: var(--pcl-font-weight-semibold);
        color: var(--color-fg);
        margin-bottom: var(--pcl-spacing-8);
      }

      .report-subtitle {
        font-size: var(--pcl-font-size-sm);
        color: var(--color-fg-tertiary);
        margin-bottom: var(--pcl-spacing-4);
      }

      .report-subtitle:last-of-type {
        margin-bottom: var(--pcl-spacing-32);
      }

      .report-subtitle a {
        color: var(--color-link);
        text-decoration: none;
        font-family: var(--pcl-font-family-mono);
        font-size: var(--pcl-font-size-xs);
      }

      .report-subtitle a:hover {
        text-decoration: underline;
      }

      /* ===================================================================
  ERROR BANNER
  =================================================================== */
      .error-banner {
        display: flex;
        align-items: center;
        gap: var(--pcl-spacing-10);
        padding: var(--pcl-spacing-12) var(--pcl-spacing-16);
        border-radius: var(--pcl-radius-lg);
        border: 1px solid var(--color-fg-caution);
        color: var(--color-fg-caution);
        font-size: var(--pcl-font-size-sm);
        margin-bottom: var(--pcl-spacing-24);
      }

      .error-banner svg {
        flex-shrink: 0;
      }

      /* ===================================================================
  SUMMARY BAR
  =================================================================== */
      .summary-bar {
        display: flex;
        flex-wrap: wrap;
        gap: var(--pcl-spacing-24);
        padding: var(--pcl-spacing-16) var(--pcl-spacing-20);
        background-color: var(--color-bg-surface);
        border: 1px solid var(--color-border);
        border-radius: var(--pcl-radius-lg);
        margin-bottom: var(--pcl-spacing-32);
      }

      .summary-item {
        display: flex;
        flex-direction: column;
        gap: var(--pcl-spacing-4);
        flex: 1;
      }

      .summary-item-label {
        font-size: var(--pcl-font-size-2xs);
        color: var(--color-fg-tertiary);
        text-transform: uppercase;
        letter-spacing: 0.4px;
        font-weight: var(--pcl-font-weight-medium);
      }

      .summary-item-value {
        font-size: var(--pcl-font-size-lg);
        font-weight: var(--pcl-font-weight-semibold);
        color: var(--color-fg);
      }

      .summary-severity-counts {
        display: flex;
        align-items: center;
        gap: var(--pcl-spacing-16);
      }

      /* ===================================================================
       SEVERITY BADGES (Pill style — matches screenshots)
       =================================================================== */
      .severity-badge {
        display: inline-flex;
        align-items: center;
        gap: var(--pcl-spacing-6);
        font-size: var(--pcl-font-size-xs);
        font-weight: var(--pcl-font-weight-medium);
        line-height: 1;
      }

      .severity-badge-icon {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 22px;
        height: 22px;
        border-radius: var(--pcl-radius-sm);
        font-size: var(--pcl-font-size-xs);
        font-weight: var(--pcl-font-weight-medium);
      }

      .severity-badge-count {
        color: var(--color-fg-secondary);
      }

      /* Severity icon colors */
      .severity-badge-icon--critical {
        background-color: var(--color-severity-critical-bg);
        color: var(--color-severity-critical-fg);
      }

      .severity-badge-icon--high {
        background-color: var(--color-severity-high-bg);
        color: var(--color-severity-high-fg);
      }

      .severity-badge-icon--medium {
        background-color: var(--color-severity-medium-bg);
        color: var(--color-severity-medium-fg);
      }

      .severity-badge-icon--low {
        background-color: var(--color-severity-low-bg);
        color: var(--color-severity-low-fg);
      }

      /* Severity label pills — shared base with severity-badge-icon */
      .severity-label {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        height: 22px;
        border-radius: var(--pcl-radius-sm);
        font-size: var(--pcl-font-size-xs);
        font-weight: var(--pcl-font-weight-medium);
        line-height: 1;
        padding: 0 var(--pcl-spacing-6);
      }

      /* Fixed-width square badge for single-char / icon short labels */
      .severity-label--short {
        width: 22px;
        padding: 0;
      }

      .severity-label--critical {
        background-color: var(--color-severity-critical-bg);
        color: var(--color-severity-critical-fg);
      }

      .severity-label--high {
        background-color: var(--color-severity-high-bg);
        color: var(--color-severity-high-fg);
      }

      .severity-label--medium {
        background-color: var(--color-severity-medium-bg);
        color: var(--color-severity-medium-fg);
      }

      .severity-label--low {
        background-color: var(--color-severity-low-bg);
        color: var(--color-severity-low-fg);
      }

      /* ===================================================================
       TAGS
       =================================================================== */
      .tag {
        display: inline-block;
        padding: var(--pcl-spacing-2) var(--pcl-spacing-8);
        border-radius: var(--pcl-radius-sm);
        font-size: var(--pcl-font-size-2xs);
        font-family: var(--pcl-font-family-mono);
        background-color: var(--pcl-color-primitives-white-alpha-8);
        color: var(--color-fg-secondary);
        border: 1px solid var(--color-border);
        line-height: var(--pcl-font-line-height-xs);
      }

      .tag-list {
        display: flex;
        flex-wrap: wrap;
        gap: var(--pcl-spacing-6);
      }

      /* ===================================================================
       FRAMEWORKS SECTION
       =================================================================== */
      .frameworks-list {
        display: flex;
        flex-direction: column;
        gap: var(--pcl-spacing-12);
      }

      .framework-row {
        display: flex;
        align-items: baseline;
        gap: var(--pcl-spacing-12);
      }

      .framework-name {
        font-size: var(--pcl-font-size-2xs);
        font-weight: var(--pcl-font-weight-semibold);
        color: var(--color-fg-tertiary);
        white-space: nowrap;
        min-width: 120px;
      }

      .framework-tags {
        display: flex;
        flex-wrap: wrap;
        gap: var(--pcl-spacing-6);
      }

      .framework-tag {
        display: inline-block;
        padding: 0 var(--pcl-spacing-8);
        border-radius: var(--pcl-radius-sm);
        font-size: var(--pcl-font-size-2xs);
        font-family: var(--pcl-font-family-mono);
        background-color: var(--pcl-color-primitives-white-alpha-8);
        color: var(--color-fg-secondary);
        border: 1px solid var(--color-border);
        line-height: var(--pcl-font-line-height-xs);
      }

      .framework-tag-hidden {
        display: none;
      }

      .framework-tag-more {
        display: inline-block;
        padding: 0 var(--pcl-spacing-8);
        border-radius: var(--pcl-radius-sm);
        font-size: var(--pcl-font-size-2xs);
        font-family: var(--pcl-font-family-mono);
        background-color: transparent;
        border: 1px solid var(--color-border);
        line-height: var(--pcl-font-line-height-xs);
        color: var(--color-link);
        cursor: pointer;
        user-select: none;
      }

      .framework-tag-more:hover {
        background-color: var(--pcl-color-primitives-white-alpha-8);
      }

      /* ===================================================================
       TABLE (Issues list)
       =================================================================== */
      .issues-table-wrapper {
        border: 1px solid var(--color-border);
        border-radius: var(--pcl-radius-lg);
        overflow: hidden;
        margin-bottom: var(--pcl-spacing-48);
      }

      .issues-table-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: var(--pcl-spacing-12) var(--pcl-spacing-20);
        background-color: var(--color-bg-surface);
        border-bottom: 1px solid var(--color-border);
        gap: var(--pcl-spacing-16);
      }

      .issues-table-title {
        font-size: var(--pcl-font-size-sm);
        font-weight: var(--pcl-font-weight-medium);
        color: var(--color-fg);
        white-space: nowrap;
      }

      /* Segmented control for group-by */
      .segmented-control {
        display: flex;
        align-items: center;
        background-color: var(--color-bg-surface-tertiary);
        border: 1px solid var(--color-border);
        border-radius: var(--pcl-radius-md);
        padding: 2px;
        gap: 2px;
      }

      .segmented-control-label {
        font-size: var(--pcl-font-size-2xs);
        color: var(--color-fg-tertiary);
        margin-right: var(--pcl-spacing-8);
        white-space: nowrap;
      }

      .segmented-control-btn {
        padding: var(--pcl-spacing-4) var(--pcl-spacing-12);
        border: none;
        border-radius: var(--pcl-radius-sm);
        background: transparent;
        color: var(--color-fg-tertiary);
        font-size: var(--pcl-font-size-2xs);
        font-family: var(--pcl-font-family-sans);
        font-weight: var(--pcl-font-weight-medium);
        cursor: pointer;
        white-space: nowrap;
        transition:
          background-color 0.15s,
          color 0.15s;
      }

      .segmented-control-btn:hover {
        color: var(--color-fg-secondary);
      }

      .segmented-control-btn--active {
        background-color: var(--pcl-color-primitives-white-alpha-12);
        color: var(--color-fg);
      }

      .segmented-control-divider {
        width: 1px;
        height: 16px;
        background-color: var(--color-border);
        margin: 0 var(--pcl-spacing-4);
        flex-shrink: 0;
      }

      /* Group header rows inside the table */
      .group-header-row td {
        padding: var(--pcl-spacing-10) var(--pcl-spacing-20);
        font-size: var(--pcl-font-size-xs);
        font-weight: var(--pcl-font-weight-semibold);
        color: var(--color-fg-secondary);
        background-color: rgba(9, 9, 11, 1);
        border-bottom: 1px solid var(--color-border);
        letter-spacing: 0.3px;
        cursor: pointer;
        user-select: none;
        transition: all 0.75s ease;
      }

      .group-header-row:not(.no-expand):hover td {
        background-color: rgba(9, 9, 11, 0.2);
      }

      .group-header-row td .group-caret {
        display: inline-block;
        margin-right: var(--pcl-spacing-8);
        font-size: var(--pcl-font-size-xs);
        color: var(--color-fg-tertiary);
        transition: transform 0.15s ease;
      }

      .group-header-row.collapsed td .group-caret {
        transform: rotate(-90deg);
      }

      .group-header-row td .group-count {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 18px;
        height: 18px;
        padding: 0 var(--pcl-spacing-4);
        border-radius: var(--pcl-radius-sm);
        background-color: var(--pcl-color-primitives-white-alpha-12);
        font-size: 11px;
        font-weight: var(--pcl-font-weight-medium);
        color: var(--color-fg-tertiary);
        margin-left: var(--pcl-spacing-6);
        vertical-align: middle;
      }

      .group-item-row.hidden {
        display: none;
      }

      /* Non-expandable group (0 issues) — no caret, align text with expandable groups */
      .group-header-row.no-expand td {
        cursor: default;
      }

      .group-header-row.no-expand .group-caret {
        visibility: hidden;
      }

      /* "None" severity badge (green) */
      .severity-label--none {
        background-color: rgba(123, 241, 168, 0.18);
        color: var(--pcl-color-primitives-green-300);
      }

      /* "Not tested" badge (yellow) */
      .severity-label--partial {
        background-color: rgba(208, 135, 0, 0.18);
        color: var(--color-fg-caution);
      }

      /* "Failed" severity badge (red/orange muted) */
      .severity-label--failed {
        background-color: rgba(255, 107, 107, 0.15);
        color: #ff6b6b;
      }

      /* "Errored" severity badge (run failed, not skipped) */
      .severity-label--error {
        background-color: rgba(255, 149, 0, 0.18);
        color: #e67e22;
      }

      /* Pale severity badges (40% alpha) for pseudo-rows */
      .severity-label--pale {
        opacity: 0.4;
      }

      /* Non-clickable pseudo-rows */
      .issues-table tbody tr.pseudo-row {
        cursor: default;
      }

      .issues-table tbody tr.pseudo-row:hover {
        background-color: transparent;
      }

      .issues-table {
        width: 100%;
        border-collapse: collapse;
      }

      .issues-table thead {
        background-color: var(--color-bg-surface);
      }

      .issues-table th {
        text-align: left;
        font-size: var(--pcl-font-size-2xs);
        font-weight: var(--pcl-font-weight-medium);
        color: var(--color-fg-tertiary);
        text-transform: uppercase;
        letter-spacing: 0.4px;
        padding: var(--pcl-spacing-10) var(--pcl-spacing-20);
        border-bottom: 1px solid var(--color-border);
      }

      .issues-table td {
        padding: var(--pcl-spacing-16) var(--pcl-spacing-20);
        border-bottom: 1px solid var(--color-border);
        vertical-align: top;
      }

      .issues-table tbody tr:last-child td {
        border-bottom: none;
      }

      .issues-table tbody tr:not(.group-header-row) {
        cursor: pointer;
        transition: all 0.75s ease;
      }

      .issues-table tbody tr:not(.group-header-row):hover {
        background-color: rgba(255, 255, 255, 0.02);
      }

      .issues-table .col-response {
        color: var(--color-fg-tertiary);
        font-size: var(--pcl-font-size-2xs);
        width: 100%;
        max-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .issues-table .col-name {
        font-weight: var(--pcl-font-weight-medium);
        color: var(--color-fg);
        white-space: nowrap;
        width: 1%;
      }

      .issues-table .group-item-row .col-severity {
        padding-left: calc(var(--pcl-spacing-16) + 1em + var(--pcl-spacing-8));
      }

      .issues-table .col-severity .severity-label {
        vertical-align: middle;
      }

      .issues-table .col-severity {
        white-space: nowrap;
        width: 1%;
        padding-right: 0;
      }

      #passedTestsWrapper .col-name {
        width: 100%;
        white-space: normal;
      }

      .issues-table .col-url a {
        color: var(--color-link);
        text-decoration: none;
      }

      .issues-table .col-url a:hover {
        text-decoration: underline;
      }

      /* ===================================================================
       ISSUE DETAIL CARD
       =================================================================== */
      .issue-card {
        background-color: var(--color-bg-surface);
        border: 1px solid var(--color-border);
        border-radius: var(--pcl-radius-lg);
        margin-bottom: var(--pcl-spacing-24);
        overflow: hidden;
      }

      .issue-card-header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: var(--pcl-spacing-16);
        padding: var(--pcl-spacing-20);
        border-bottom: 1px solid var(--color-border);
      }

      .issue-card-header-left {
        display: flex;
        flex-direction: column;
        gap: var(--pcl-spacing-4);
      }

      .issue-card-title {
        font-size: var(--pcl-font-size-base);
        font-weight: var(--pcl-font-weight-semibold);
        color: var(--color-fg);
      }

      .issue-card-description {
        font-size: var(--pcl-font-size-xs);
        color: var(--color-fg-tertiary);
      }

      .issue-card-id {
        font-size: var(--pcl-font-size-2xs);
        color: var(--color-fg-tertiary);
      }

      .issue-card-id code {
        font-family: var(--pcl-font-family-mono);
      }

      .return-to-top {
        display: block;
        font-size: var(--pcl-font-size-2xs);
        color: var(--color-link);
        text-decoration: none;
        margin-top: var(--pcl-spacing-4);
      }

      .return-to-top:hover {
        color: var(--color-link-hover);
        text-decoration: underline;
      }

      .issue-card-section {
        padding: var(--pcl-spacing-20);
        border-bottom: 1px solid var(--color-border);
      }

      .issue-card-section:last-child {
        border-bottom: none;
      }

      .issue-card-section-title {
        font-size: var(--pcl-font-size-2xs);
        font-weight: var(--pcl-font-weight-semibold);
        color: var(--color-fg-tertiary);
        text-transform: uppercase;
        letter-spacing: 0.4px;
        margin-bottom: var(--pcl-spacing-12);
      }

      /* ===================================================================
       CONVERSATION TURNS
       =================================================================== */
      .conversation-turns {
        display: flex;
        flex-direction: column;
        gap: var(--pcl-spacing-16);
      }

      .conversation-turn {
        display: flex;
        flex-direction: column;
        gap: var(--pcl-spacing-8);
      }

      .conversation-label {
        font-size: var(--pcl-font-size-2xs);
        font-weight: var(--pcl-font-weight-semibold);
        text-transform: uppercase;
        letter-spacing: 0.4px;
      }

      .conversation-label--request {
        color: var(--pcl-color-primitives-orange-300);
      }

      .conversation-label--response {
        color: var(--pcl-color-primitives-blue-300);
      }

      .conversation-bubble {
        font-size: var(--pcl-font-size-xs);
        line-height: var(--pcl-font-line-height-sm);
        color: var(--color-fg-secondary);
        background-color: var(--color-bg-surface-tertiary);
        border: 1px solid var(--color-border);
        border-radius: var(--pcl-radius-md);
        padding: var(--pcl-spacing-12) var(--pcl-spacing-16);
        white-space: pre-wrap;
        word-break: break-word;
        font-family: var(--pcl-font-family-mono);
        max-height: 300px;
        overflow-y: auto;
      }

      /* ===================================================================
       REASONING
       =================================================================== */
      .evidence-block {
        font-size: var(--pcl-font-size-xs);
        color: var(--color-fg-secondary);
        line-height: var(--pcl-font-line-height-sm);
      }

      /* ===================================================================
       SECTION DIVIDER
       =================================================================== */
      .section-divider {
        border: none;
        border-top: 1px solid var(--color-border);
        margin: var(--pcl-spacing-40) 0;
      }

      .section-heading {
        font-size: var(--pcl-font-size-lg);
        font-weight: var(--pcl-font-weight-semibold);
        color: var(--color-fg);
        margin-bottom: var(--pcl-spacing-20);
      }

      /* ===================================================================
       RESPONSIVE
       =================================================================== */
      @media (max-width: 768px) {
        .report-container {
          padding: var(--pcl-spacing-16);
        }

        .summary-bar {
          flex-direction: column;
          gap: var(--pcl-spacing-16);
        }

        .issues-table th,
        .issues-table td {
          padding: var(--pcl-spacing-10) var(--pcl-spacing-12);
        }

        .issue-card-header {
          flex-direction: column;
        }
      }
    </style>

    <!-- =================================================================

    <script>
      (function () {
        const root = document.getElementById("report-root");

        // ── Helpers ──────────────��─������─���──────────────────────────────────
        function escapeHtml(str) {
          const div = document.createElement("div");
          div.textContent = str;
          return div.innerHTML;
        }

        function shortId(id) {
          return id ? id.substring(0, 8) : "—";
        }

        function severityCounts(results) {
          const counts = { critical: 0, high: 0, medium: 0, low: 0 };
          results.forEach((r) => {
            const s = (r.severity || "").toLowerCase();
            if (counts.hasOwnProperty(s)) counts[s]++;
          });
          return counts;
        }

        function severityOrder(severity) {
          const order = { critical: 0, high: 1, medium: 2, low: 3 };
          return order[(severity || "").toLowerCase()] ?? 4;
        }

        function severityBadgeIcon(level, count) {
          const letter = level.charAt(0).toUpperCase();
          const isZero = count === 0;
          return `
          <span class="severity-badge">
            <span class="severity-badge-icon severity-badge-icon--${level} ${isZero ? "severity-badge-icon--zero" : ""}">${letter}</span>
            <span class="severity-badge-count">${count}</span>
          </span>`;
        }

        function severityLabel(level) {
          return `<span class="severity-label severity-label--${level}">${level.charAt(0).toUpperCase() + level.slice(1)}</span>`;
        }

        function severityLabelShort(level) {
          return `<span class="severity-label severity-label--short severity-label--${level}">${level.charAt(0).toUpperCase()}</span>`;
        }

        function severityLabelPale(level) {
          return `<span class="severity-label severity-label--${level} severity-label--pale">${level.charAt(0).toUpperCase() + level.slice(1)}</span>`;
        }

        function severityLabelPaleShort(level) {
          return `<span class="severity-label severity-label--short severity-label--${level} severity-label--pale">${level.charAt(0).toUpperCase()}</span>`;
        }

        function severityLabelNone() {
          return `<span class="severity-label severity-label--none">None</span>`;
        }

        function severityLabelNoneShort() {
          return `<span class="severity-label severity-label--short severity-label--none"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></span>`;
        }

        function severityLabelPartialShort() {
          return `<span class="severity-label severity-label--short severity-label--partial">−</span>`;
        }

        function severityLabelFailedShort() {
          return `<span class="severity-label severity-label--short severity-label--failed"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></span>`;
        }

        function severityLabelErrorShort() {
          return `<span class="severity-label severity-label--short severity-label--error"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg></span>`;
        }

        /**
         * Parse framework tags into a Map of { frameworkName => [section, ...] }.
         * Tag format: "framework: <FRAMEWORK_NAME>, <SECTION>"
         * The framework name is the part after "framework:" and before the first comma.
         * The section is everything after the first comma.
         *
         * e.g. "framework: OWASP LLM Top 10, LLM01:2025"
         *   => framework = "OWASP LLM Top 10", section = "LLM01:2025"
         * e.g. "framework: MITRE ATLAS, AML.TA0001"
         *   => framework = "MITRE ATLAS", section = "AML.TA0001"
         * e.g. "framework: NIST AI RMF, MEASURE 1.1"
         *   => framework = "NIST AI RMF", section = "MEASURE 1.1"
         * e.g. "framework: OWASP Agentic, ASI01"
         *   => framework = "OWASP Agentic", section = "ASI01"
         */
        function parseFrameworkTags(tags) {
          const map = new Map();
          tags.forEach((tag) => {
            if (!tag.startsWith("framework:")) return;
            const rest = tag.substring("framework:".length).trim();
            const commaIdx = rest.indexOf(",");
            let frameworkName, section;
            if (commaIdx !== -1) {
              frameworkName = rest.substring(0, commaIdx).trim();
              section = rest.substring(commaIdx + 1).trim();
            } else {
              frameworkName = rest.trim();
              section = null;
            }
            if (!map.has(frameworkName)) {
              map.set(frameworkName, []);
            }
            if (section) {
              map.get(frameworkName).push(section);
            }
          });
          return map;
        }

        // Group results by definition id
        function groupByDefinition(results) {
          const map = new Map();
          results.forEach((r) => {
            const key = r.definition.id;
            if (!map.has(key)) {
              map.set(key, { definition: r.definition, items: [] });
            }
            map.get(key).items.push(r);
          });
          return Array.from(map.values());
        }

        // Get unique URLs
        function uniqueUrls(results) {
          return [...new Set(results.map((r) => r.url).filter(Boolean))];
        }

        // ── Render ──────────────────────────────────────────────────────
        const data = REPORT_DATA;
        const results = data.results || [];
        const summaryVulns = (data.summary && Array.isArray(data.summary.vulnerabilities))
          ? data.summary.vulnerabilities
          : [];
        const useSummaryAsSource = summaryVulns.length > 0;

        const issueTypesDetectedCount = useSummaryAsSource
          ? summaryVulns.filter((v) => v.vulnerable).length
          : new Set(results.map((r) => r.definition.id)).size;
        const issueTypesPassedCount = useSummaryAsSource
          ? summaryVulns.filter((v) => !v.vulnerable && v.status !== "skipped" && v.status !== "error").length
          : (VULNERABILITY_CATALOG.length - new Set(results.map((r) => r.definition.id)).size);

        const counts = severityCounts(results);
        const urls = uniqueUrls(results);
        const groups = groupByDefinition(results);

        function buildFrameworkSectionsFromTags(results) {
          const byName = {};
          results.forEach((r) => {
            const m = parseFrameworkTags(r.tags || []);
            m.forEach((sections, fwName) => {
              if (!byName[fwName]) byName[fwName] = new Set();
              sections.forEach((s) => byName[fwName].add(s));
            });
          });
          const out = {};
          Object.keys(byName)
            .sort()
            .forEach((fw) => {
              out[fw] = [...byName[fw]].sort();
            });
          return out;
        }
        const FRAMEWORK_SECTIONS_FROM_TAGS =
          buildFrameworkSectionsFromTags(results);
        const GROUP_BY_OPTIONS = ["None", "Severity", "Issue type"].concat(
          Object.keys(FRAMEWORK_SECTIONS_FROM_TAGS).sort(),
        );

        // Sort results by severity
        const sortedResults = [...results].sort(
          (a, b) => severityOrder(a.severity) - severityOrder(b.severity),
        );

        let html = "";

        // ── Title ───────────────────────────────────────────────────────
        html += `
        <h1 class="report-title" id="report-top">Red teaming report</h1>
        <p class="report-subtitle">Report ID: ${escapeHtml(data.id)}</p>
        <p class="report-subtitle">Target URL: ${urls.map((u) => `<a href="${escapeHtml(u)}" target="_blank" rel="noopener">${escapeHtml(u)}</a>`).join(", ")}</p>`;

        // ── Error Banner ─────────────────────────────────────���──────────
        if (data.error && data.error.trim()) {
          html += `
        <div class="error-banner">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          <span class="error-banner-text">${escapeHtml(data.error)}</span>
        </div>`;
        }

        // ── Summary Bar ─────────────────────────────────────────────────
        html += `
        <div class="summary-bar">
          <div class="summary-item">
            <span class="summary-item-label">Total issues</span>
            <span class="summary-item-value">${results.length}</span>
          </div>
          <div class="summary-item">
            <span class="summary-item-label">Issue types detected</span>
            <span class="summary-item-value">${issueTypesDetectedCount}</span>
          </div>
          <div class="summary-item">
            <span class="summary-item-label">Issue types passed</span>
            <span class="summary-item-value">${issueTypesPassedCount}</span>
          </div>
          <div class="summary-item">
            <span class="summary-item-label">Severity Breakdown</span>
            <div class="summary-severity-counts">
              ${severityBadgeIcon("critical", counts.critical)}
              ${severityBadgeIcon("high", counts.high)}
              ${severityBadgeIcon("medium", counts.medium)}
              ${severityBadgeIcon("low", counts.low)}
            </div>
          </div>
        </div>`;

        // ── Issues Table (with group-by) ─────────────────────────────────

        /**
         * Group issues by a framework name.
         * Returns an array of { section, items[] } sorted by section name.
         * Issues that don't map to the selected framework go into "Other".
         */
        function groupIssuesByFramework(issues, frameworkName) {
          const grouped = new Map();
          const unmapped = [];
          issues.forEach((r) => {
            const fwMap = parseFrameworkTags(r.tags || []);
            const sections = fwMap.get(frameworkName);
            if (sections && sections.length > 0) {
              sections.forEach((sec) => {
                if (!grouped.has(sec)) grouped.set(sec, []);
                grouped.get(sec).push(r);
              });
            } else {
              unmapped.push(r);
            }
          });
          const result = [];
          [...grouped.keys()].sort().forEach((key) => {
            result.push({ section: key, items: grouped.get(key) });
          });
          if (unmapped.length > 0) {
            result.push({ section: "Other", items: unmapped });
          }
          return result;
        }

        /**
         * Group issues by severity.
         * Returns groups ordered: critical, high, medium, low.
         */
        function groupIssuesBySeverity(issues) {
          const order = ["critical", "high", "medium", "low"];
          const grouped = new Map();
          issues.forEach((r) => {
            const sev = (r.severity || "low").toLowerCase();
            if (!grouped.has(sev)) grouped.set(sev, []);
            grouped.get(sev).push(r);
          });
          const result = [];
          order.forEach((sev) => {
            if (grouped.has(sev)) {
              result.push({
                section: sev.charAt(0).toUpperCase() + sev.slice(1),
                items: grouped.get(sev),
                severity: sev,
              });
            }
          });
          return result;
        }

        /**
         * Group issues by issue type (definition name).
         * Returns groups sorted alphabetically by name.
         * Derives group severity from the items (all items in a type share the same severity).
         */
        function groupIssuesByType(issues) {
          const grouped = new Map();
          issues.forEach((r) => {
            const name = r.definition.name || "Unknown";
            if (!grouped.has(name)) grouped.set(name, []);
            grouped.get(name).push(r);
          });
          const result = [];
          [...grouped.keys()].sort().forEach((key) => {
            const items = grouped.get(key);
            const severity = (items[0].severity || "low").toLowerCase();
            result.push({ section: key, items, severity });
          });
          return result;
        }

        const SEVERITY_ORDER = { critical: 0, high: 1, medium: 2, low: 3 };

        function highestSeverity(items) {
          let best = "low";
          items.forEach((r) => {
            const sev = (r.severity || "low").toLowerCase();
            if ((SEVERITY_ORDER[sev] ?? 4) < (SEVERITY_ORDER[best] ?? 4))
              best = sev;
          });
          return best;
        }

        function renderTableRows(issues, groupId) {
          const groupClass =
            groupId != null
              ? ` group-item-row hidden" data-group-id="${groupId}`
              : "";
          return issues
            .map((r) => {
              const sev = (r.severity || "low").toLowerCase();
              return `
              <tr class="${groupClass}" onclick="document.getElementById('issue-${r.id}').scrollIntoView({ behavior: 'smooth', block: 'start' })">
                <td class="col-severity">${severityLabelShort(sev)}</td>
                <td class="col-name">${escapeHtml(r.definition.name)}</td>
                <td class="col-response" title="${escapeHtml((r.turns && r.turns[0] ? r.turns[0].response : "").trim())}">${escapeHtml((r.turns && r.turns[0] ? r.turns[0].response : "").trim())}</td>
              </tr>`;
            })
            .join("");
        }

        function renderTableBody(issues, groupBy) {
          if (groupBy === "None") {
            return renderTableRows(issues);
          }
          let groups;
          if (groupBy === "Severity") {
            groups = groupIssuesBySeverity(issues);
          } else if (groupBy === "Issue type") {
            groups = groupIssuesByType(issues);
          } else {
            groups = groupIssuesByFramework(issues, groupBy);
          }
          return groups
            .map((g, i) => {
              let badge;
              if (g.severity) {
                badge = severityLabel(g.severity);
              } else if (g.items.length > 0) {
                badge = severityLabel(highestSeverity(g.items));
              } else {
                badge = "";
              }
              const shortBadge = g.severity
                ? severityLabelShort(g.severity)
                : g.items.length > 0
                  ? severityLabelShort(highestSeverity(g.items))
                  : "";
              return (
                `<tr class="group-header-row collapsed" data-group-id="${i}"><td class="col-severity"><span class="group-caret">&#9660;</span>${shortBadge}</td><td colspan="2">${escapeHtml(sectionFullName(g.section))} <span class="group-count">${g.items.length}</span></td></tr>` +
                renderTableRows(g.items, i)
              );
            })
            .join("");
        }

        html += `
        <div class="issues-table-wrapper">
          <div class="issues-table-header">
            <span class="issues-table-title"><span class="severity-label severity-label--${highestSeverity(results)}" id="issuesDetectedLabel">${results.length} issues detected</span></span>
            <div style="display:flex;align-items:center;gap:var(--pcl-spacing-8);">
              <span class="segmented-control-label">Group by</span>
              <div class="segmented-control" id="groupByControl">
                ${GROUP_BY_OPTIONS.map((opt, i) => {
                  const btn = `<button class="segmented-control-btn${opt === "None" ? " segmented-control-btn--active" : ""}" data-group="${opt}">${opt}</button>`;
                  // Insert a divider between "Issue type" (index 2) and "OWASP" (index 3)
                  return (
                    (i === 3 || i === 1
                      ? '<span class="segmented-control-divider"></span>'
                      : "") + btn
                  );
                }).join("")}
              </div>
            </div>
          </div>
          ${
            results.length > 0
              ? `<table class="issues-table">
            <thead>
              <tr>
                <th></th>
                <th>Name</th>
                <th>Model response</th>
              </tr>
            </thead>
            <tbody id="issuesTableBody">
              ${renderTableBody(sortedResults, "None")}
            </tbody>
          </table>`
              : ""
          }
        </div>`;

        // ── Passed Tests table ──────────────────────────────────────────
        const foundDefIds = new Set(results.map((r) => r.definition.id));

        function isErroneousResult(r) {
          if (!r.error || !r.error.trim()) return false;
          const noTurns = !r.turns || r.turns.length === 0;
          const noEvidence =
            !r.evidence ||
            (typeof r.evidence === "object" &&
              Object.keys(r.evidence).length === 0);
          return noTurns || noEvidence;
        }

        let passedTypes, partialTypes, errorTypes, failedTypes;
        if (useSummaryAsSource) {
          const failedTypeSlugs = new Set();
          summaryVulns.forEach((v) => {
            const defResults = results.filter((r) => r.definition.id === v.slug);
            if (defResults.length > 0 && defResults.every(isErroneousResult)) {
              failedTypeSlugs.add(v.slug);
            }
          });
          passedTypes = summaryVulns.filter(
            (v) => !v.vulnerable && v.status !== "skipped" && v.status !== "error" && !failedTypeSlugs.has(v.slug),
          );
          partialTypes = summaryVulns.filter((v) => v.status === "skipped");
          errorTypes = summaryVulns.filter((v) => v.status === "error");
          failedTypes = summaryVulns.filter((v) => failedTypeSlugs.has(v.slug));
        } else {
          errorTypes = [];
          function classifyDefId(defId) {
            const defResults = results.filter((r) => r.definition.id === defId);
            if (defResults.length === 0) return "passed";
            const hasErr = defResults.some(isErroneousResult);
            const hasGood = defResults.some((r) => !isErroneousResult(r));
            if (hasErr && hasGood) return "partial";
            if (hasErr && !hasGood) return "failed";
            return "issues";
          }
          partialTypes = VULNERABILITY_CATALOG.filter(
            (v) => classifyDefId(v.id) === "partial",
          );
          failedTypes = VULNERABILITY_CATALOG.filter(
            (v) => classifyDefId(v.id) === "failed",
          );
          const failedTypeIds = new Set(failedTypes.map((v) => v.id));
          passedTypes = VULNERABILITY_CATALOG.filter(
            (v) => !foundDefIds.has(v.id) && !failedTypeIds.has(v.id),
          );
        }

        /**
         * Render the passed-tests table body based on the current group-by mode.
         */
        // Classify framework sections into partial (mixed) and failed (all erroneous)
        function classifySections(frameworkName) {
          const sectionsWithGoodResults = new Set();
          const sectionsWithErrResults = new Set();
          results.forEach((r) => {
            const fwMap = parseFrameworkTags(r.tags || []);
            const sections = fwMap.get(frameworkName);
            if (!sections) return;
            if (isErroneousResult(r)) {
              sections.forEach((s) => sectionsWithErrResults.add(s));
            } else {
              sections.forEach((s) => sectionsWithGoodResults.add(s));
            }
          });
          // Partial = has both erroneous AND good results
          const partial = new Set(
            [...sectionsWithErrResults].filter((s) =>
              sectionsWithGoodResults.has(s),
            ),
          );
          // Failed = has ONLY erroneous results (no good)
          const failed = new Set(
            [...sectionsWithErrResults].filter(
              (s) => !sectionsWithGoodResults.has(s),
            ),
          );
          return { partial, failed };
        }

        function renderPassedTableBody(groupBy) {
          if (groupBy === "None" || groupBy === "Severity") {
            let html = "";
            // Passed group
            if (passedTypes.length > 0) {
              const pseudoRows = passedTypes
                .map((v) => {
                  return `<tr class="group-item-row hidden pseudo-row" data-group-id="passed-0">
                  <td class="col-severity">${severityLabelNoneShort()}</td>
                  <td class="col-name">${escapeHtml(v.name)}</td>
                </tr>`;
                })
                .join("");
              html +=
                `<tr class="group-header-row collapsed" data-group-id="passed-0"><td class="col-severity"><span class="group-caret">&#9660;</span>${severityLabelNoneShort()}</td><td>Passed issue types <span class="group-count">${passedTypes.length}</span></td></tr>` +
                pseudoRows;
            }
            // Not tested group
            if (partialTypes.length > 0) {
              const partialRows = partialTypes
                .map((v) => {
                  return `<tr class="group-item-row hidden pseudo-row" data-group-id="passed-partial">
                  <td class="col-severity">${severityLabelPartialShort()}</td>
                  <td class="col-name">${escapeHtml(v.name)}</td>
                </tr>`;
                })
                .join("");
              html +=
                `<tr class="group-header-row collapsed" data-group-id="passed-partial"><td class="col-severity"><span class="group-caret">&#9660;</span>${severityLabelPartialShort()}</td><td>Skipped <span class="group-count">${partialTypes.length}</span></td></tr>` +
                partialRows;
            }
            // Errored group (run failed)
            if (errorTypes.length > 0) {
              const errorRows = errorTypes
                .map((v) => {
                  return `<tr class="group-item-row hidden pseudo-row" data-group-id="passed-error">
                  <td class="col-severity">${severityLabelErrorShort()}</td>
                  <td class="col-name">${escapeHtml(v.name)}</td>
                </tr>`;
                })
                .join("");
              html +=
                `<tr class="group-header-row collapsed" data-group-id="passed-error"><td class="col-severity"><span class="group-caret">&#9660;</span>${severityLabelErrorShort()}</td><td>Errored <span class="group-count">${errorTypes.length}</span></td></tr>` +
                errorRows;
            }
            // Failed group
            if (failedTypes.length > 0) {
              const failedRows = failedTypes
                .map((v) => {
                  const sev = (v.severity || "low").toLowerCase();
                  return `<tr class="group-item-row hidden pseudo-row" data-group-id="passed-failed">
                  <td class="col-severity">${severityLabelPaleShort(sev)}</td>
                  <td class="col-name">${escapeHtml(v.name)}</td>
                </tr>`;
                })
                .join("");
              html +=
                `<tr class="group-header-row collapsed" data-group-id="passed-failed"><td class="col-severity"><span class="group-caret">&#9660;</span>${severityLabelFailedShort()}</td><td>Failed tests <span class="group-count">${failedTypes.length}</span></td></tr>` +
                failedRows;
            }
            return html;
          }

          if (groupBy === "Issue type") {
            let html = "";
            if (passedTypes.length > 0) {
              const pseudoRows = passedTypes
                .sort((a, b) => a.name.localeCompare(b.name))
                .map((v) => {
                  return `<tr class="group-item-row hidden pseudo-row" data-group-id="passed-0">
                  <td class="col-severity">${severityLabelNoneShort()}</td>
                  <td class="col-name">${escapeHtml(v.name)}</td>
                </tr>`;
                })
                .join("");
              html +=
                `<tr class="group-header-row collapsed" data-group-id="passed-0"><td class="col-severity"><span class="group-caret">&#9660;</span>${severityLabelNoneShort()}</td><td>Passed issue types <span class="group-count">${passedTypes.length}</span></td></tr>` +
                pseudoRows;
            }
            if (partialTypes.length > 0) {
              const partialRows = partialTypes
                .sort((a, b) => a.name.localeCompare(b.name))
                .map((v) => {
                  return `<tr class="group-item-row hidden pseudo-row" data-group-id="passed-partial">
                  <td class="col-severity">${severityLabelPartialShort()}</td>
                  <td class="col-name">${escapeHtml(v.name)}</td>
                </tr>`;
                })
                .join("");
              html +=
                `<tr class="group-header-row collapsed" data-group-id="passed-partial"><td class="col-severity"><span class="group-caret">&#9660;</span>${severityLabelPartialShort()}</td><td>Skipped <span class="group-count">${partialTypes.length}</span></td></tr>` +
                partialRows;
            }
            if (errorTypes.length > 0) {
              const errorRows = errorTypes
                .sort((a, b) => a.name.localeCompare(b.name))
                .map((v) => {
                  return `<tr class="group-item-row hidden pseudo-row" data-group-id="passed-error">
                  <td class="col-severity">${severityLabelErrorShort()}</td>
                  <td class="col-name">${escapeHtml(v.name)}</td>
                </tr>`;
                })
                .join("");
              html +=
                `<tr class="group-header-row collapsed" data-group-id="passed-error"><td class="col-severity"><span class="group-caret">&#9660;</span>${severityLabelErrorShort()}</td><td>Errored <span class="group-count">${errorTypes.length}</span></td></tr>` +
                errorRows;
            }
            if (failedTypes.length > 0) {
              const failedRows = failedTypes
                .sort((a, b) => a.name.localeCompare(b.name))
                .map((v) => {
                  const sev = (v.severity || "low").toLowerCase();
                  return `<tr class="group-item-row hidden pseudo-row" data-group-id="passed-failed">
                  <td class="col-severity">${severityLabelPaleShort(sev)}</td>
                  <td class="col-name">${escapeHtml(v.name)}</td>
                </tr>`;
                })
                .join("");
              html +=
                `<tr class="group-header-row collapsed" data-group-id="passed-failed"><td class="col-severity"><span class="group-caret">&#9660;</span>${severityLabelFailedShort()}</td><td>Failed tests <span class="group-count">${failedTypes.length}</span></td></tr>` +
                failedRows;
            }
            return html;
          }

          // Framework group-by (only when we have framework data from tags)
          const frameworkName = groupBy;
          const allSections = FRAMEWORK_SECTIONS_FROM_TAGS[frameworkName] || [];
          const { partial: partialSecs, failed: failedSecs } =
            classifySections(frameworkName);

          // Sections with any results at all
          const sectionsWithAnyResults = new Set();
          results.forEach((r) => {
            const fwMap = parseFrameworkTags(r.tags || []);
            const sections = fwMap.get(frameworkName);
            if (sections)
              sections.forEach((s) => sectionsWithAnyResults.add(s));
          });

          // Passed = no results at all
          const passedSections = allSections.filter(
            (s) => !sectionsWithAnyResults.has(s),
          );
          const partialSectionsList = allSections.filter((s) =>
            partialSecs.has(s),
          );
          const failedSectionsList = allSections.filter((s) =>
            failedSecs.has(s),
          );

          let html = passedSections
            .map((sec) => {
              return `<tr class="group-header-row no-expand"><td class="col-severity"><span class="group-caret">&#9660;</span>${severityLabelNoneShort()}</td><td>${escapeHtml(sectionFullName(sec))}</td></tr>`;
            })
            .join("");
          html += partialSectionsList
            .map((sec) => {
              return `<tr class="group-header-row no-expand"><td class="col-severity"><span class="group-caret">&#9660;</span>${severityLabelPartialShort()}</td><td>${escapeHtml(sectionFullName(sec))}</td></tr>`;
            })
            .join("");
          html += failedSectionsList
            .map((sec) => {
              return `<tr class="group-header-row no-expand"><td class="col-severity"><span class="group-caret">&#9660;</span>${severityLabelFailedShort()}</td><td>${escapeHtml(sectionFullName(sec))}</td></tr>`;
            })
            .join("");
          return html;
        }

        function passedTestsCount(groupBy) {
          if (
            groupBy === "None" ||
            groupBy === "Severity" ||
            groupBy === "Issue type"
          ) {
            return passedTypes.length;
          }
          const frameworkName = groupBy;
          const allSections = FRAMEWORK_SECTIONS_FROM_TAGS[frameworkName] || [];
          const sectionsWithAnyResults = new Set();
          results.forEach((r) => {
            const fwMap = parseFrameworkTags(r.tags || []);
            const sections = fwMap.get(frameworkName);
            if (sections)
              sections.forEach((s) => sectionsWithAnyResults.add(s));
          });
          return allSections.filter((s) => !sectionsWithAnyResults.has(s))
            .length;
        }

        function partialTestsCount(groupBy) {
          if (
            groupBy === "None" ||
            groupBy === "Severity" ||
            groupBy === "Issue type"
          ) {
            return partialTypes.length;
          }
          const frameworkName = groupBy;
          const { partial } = classifySections(frameworkName);
          return partial.size;
        }

        function failedTestsCount(groupBy) {
          if (
            groupBy === "None" ||
            groupBy === "Severity" ||
            groupBy === "Issue type"
          ) {
            return failedTypes.length;
          }
          const frameworkName = groupBy;
          const { failed } = classifySections(frameworkName);
          return failed.size;
        }

        function errorTestsCount(groupBy) {
          if (
            groupBy === "None" ||
            groupBy === "Severity" ||
            groupBy === "Issue type"
          ) {
            return errorTypes.length;
          }
          return 0;
        }

        const initialPassedCount = passedTestsCount("None");
        const initialPartialCount = partialTestsCount("None");
        const initialFailedCount = failedTestsCount("None");
        const initialErrorCount = errorTestsCount("None");
        const showPassedWrapper =
          initialPassedCount > 0 ||
          initialPartialCount > 0 ||
          initialFailedCount > 0 ||
          initialErrorCount > 0;
        html += `
        <div class="issues-table-wrapper" id="passedTestsWrapper" ${!showPassedWrapper ? 'style="display:none"' : ""}>
          <div class="issues-table-header">
            <span class="issues-table-title"><span class="severity-label severity-label--none" id="passedTestsLabel" ${initialPassedCount === 0 ? 'style="display:none"' : ""}><span id="passedTestsCount">${initialPassedCount}</span>&nbsp;passed (no issues found)</span> <span class="severity-label severity-label--partial" id="partialTestsLabel" ${initialPartialCount === 0 ? 'style="display:none"' : ""}><span id="partialTestsCount">${initialPartialCount}</span>&nbsp;Skipped</span> <span class="severity-label severity-label--error" id="errorTestsLabel" ${initialErrorCount === 0 ? 'style="display:none"' : ""}><span id="errorTestsCount">${initialErrorCount}</span>&nbsp;Errored</span> <span class="severity-label severity-label--failed" id="failedTestsLabel" ${initialFailedCount === 0 ? 'style="display:none"' : ""}><span id="failedTestsCount">${initialFailedCount}</span> failed tests</span></span>
          </div>
          <table class="issues-table">
            <thead>
              <tr>
                <th></th>
                <th>Name</th>
              </tr>
            </thead>
            <tbody id="passedTestsBody">
              ${renderPassedTableBody("None")}
            </tbody>
          </table>
        </div>`;

        // Wire up segmented control and group collapse after render
        function initGroupByControl() {
          const control = document.getElementById("groupByControl");
          const tbody = document.getElementById("issuesTableBody");
          const passedBody = document.getElementById("passedTestsBody");
          const passedWrapper = document.getElementById("passedTestsWrapper");
          const passedCountEl = document.getElementById("passedTestsCount");
          const partialCountEl = document.getElementById("partialTestsCount");
          const partialLabelEl = document.getElementById("partialTestsLabel");
          const errorCountEl = document.getElementById("errorTestsCount");
          const errorLabelEl = document.getElementById("errorTestsLabel");
          const failedCountEl = document.getElementById("failedTestsCount");
          const failedLabelEl = document.getElementById("failedTestsLabel");
          const issuesLabel = document.getElementById("issuesDetectedLabel");
          if (!control) return;
          control.addEventListener("click", function (e) {
            const btn = e.target.closest(".segmented-control-btn");
            if (!btn) return;
            control
              .querySelectorAll(".segmented-control-btn")
              .forEach((b) =>
                b.classList.remove("segmented-control-btn--active"),
              );
            btn.classList.add("segmented-control-btn--active");
            const groupBy = btn.dataset.group;
            if (tbody) {
              tbody.innerHTML = renderTableBody(sortedResults, groupBy);
            }
            // Update issues title with section count for framework group-by
            if (issuesLabel) {
              const isFramework =
                groupBy !== "None" &&
                groupBy !== "Severity" &&
                groupBy !== "Issue type";
              if (isFramework) {
                const groups = groupIssuesByFramework(sortedResults, groupBy);
                const sectionCount = groups.filter(
                  (g) => g.items.length > 0,
                ).length;
                issuesLabel.textContent = `${results.length} issues detected (${sectionCount} sections)`;
              } else {
                issuesLabel.textContent = `${results.length} issues detected`;
              }
            }
            // Update passed tests table
            if (passedBody) {
              passedBody.innerHTML = renderPassedTableBody(groupBy);
              const count = passedTestsCount(groupBy);
              const pCount = partialTestsCount(groupBy);
              const eCount = errorTestsCount(groupBy);
              const fCount = failedTestsCount(groupBy);
              if (passedCountEl) passedCountEl.textContent = count;
              const passedLabelEl = document.getElementById("passedTestsLabel");
              if (passedLabelEl) passedLabelEl.style.display = count > 0 ? "" : "none";
              if (partialCountEl) partialCountEl.textContent = pCount;
              if (partialLabelEl)
                partialLabelEl.style.display = pCount > 0 ? "" : "none";
              if (errorCountEl) errorCountEl.textContent = eCount;
              if (errorLabelEl)
                errorLabelEl.style.display = eCount > 0 ? "" : "none";
              if (failedCountEl) failedCountEl.textContent = fCount;
              if (failedLabelEl)
                failedLabelEl.style.display = fCount > 0 ? "" : "none";
              if (passedWrapper)
                passedWrapper.style.display =
                  count === 0 && pCount === 0 && eCount === 0 && fCount === 0 ? "none" : "";
            }
            initGroupCollapse();
          });
          initGroupCollapse();
        }

        function initGroupCollapse() {
          // Wire collapse for both tables
          ["issuesTableBody", "passedTestsBody"].forEach((id) => {
            const tbody = document.getElementById(id);
            if (!tbody) return;
            tbody
              .querySelectorAll(".group-header-row:not(.no-expand)")
              .forEach((row) => {
                // Skip if already wired
                if (row.dataset.collapseWired) return;
                row.dataset.collapseWired = "true";
                row.addEventListener("click", function () {
                  const groupId = this.dataset.groupId;
                  const isCollapsed = this.classList.toggle("collapsed");
                  tbody
                    .querySelectorAll(
                      `.group-item-row[data-group-id="${groupId}"]`,
                    )
                    .forEach((r) => {
                      r.classList.toggle("hidden", isCollapsed);
                    });
                });
              });
          });
        }

        // ── Detailed Issue Cards ────────────────────────────────────────
        if (sortedResults.length > 0) {
          html += `<hr class="section-divider" />`;
          html += `<h2 class="section-heading">Issue details</h2>`;
        }

        sortedResults.forEach((r, i) => {
          const sev = (r.severity || "low").toLowerCase();

          html += `
        <div class="issue-card" id="issue-${r.id}">
          <div class="issue-card-header">
            <div class="issue-card-header-left">
              <span class="issue-card-title">${escapeHtml(r.definition.name)}</span>
              <span class="issue-card-description">${escapeHtml(r.definition.description)}</span>
              <span class="issue-card-id">ID: <code>${escapeHtml(r.id)}</code></span>
              <a href="#report-top" class="return-to-top">Return to top <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: middle;"><path d="M12 19V5"/><path d="M5 12l7-7 7 7"/></svg></a>
            </div>
            ${severityLabel(sev)}
          </div>`;

          // Frameworks
          if (r.tags && r.tags.length) {
            const frameworkMap = parseFrameworkTags(r.tags);
            if (frameworkMap.size > 0) {
              html += `
          <div class="issue-card-section">
            <div class="issue-card-section-title">Frameworks</div>
            <div class="frameworks-list">`;
              const FRAMEWORK_ORDER = [
                "OWASP LLM Top 10",
                "OWASP Agentic",
                "MITRE ATLAS",
                "NIST AI RMF",
              ];
              FRAMEWORK_ORDER.forEach((fwName) => {
                const sections = frameworkMap.get(fwName);
                if (!sections || sections.length === 0) return;
                const MAX_VISIBLE = 3;
                const hiddenCount = Math.max(0, sections.length - MAX_VISIBLE);
                const tagsHtml = sections
                  .map((s, idx) => {
                    const cls =
                      idx >= MAX_VISIBLE
                        ? "framework-tag framework-tag-hidden"
                        : "framework-tag";
                    return `<span class="${cls}">${escapeHtml(sectionFullName(s))}</span>`;
                  })
                  .join("");
                const moreBtn =
                  hiddenCount > 0
                    ? `<span class="framework-tag-more" data-expand="true">+${hiddenCount}</span>`
                    : "";
                html += `
              <div class="framework-row">
                <span class="framework-name">${escapeHtml(fwName)}:</span>
                <div class="framework-tags">
                  ${tagsHtml}${moreBtn}
                </div>
              </div>`;
              });
              html += `
            </div>
          </div>`;
            }
          }

          // Conversation turns
          if (r.turns && r.turns.length) {
            html += `
          <div class="issue-card-section">
            <div class="issue-card-section-title">Conversation</div>
            <div class="conversation-turns">`;

            r.turns.forEach((turn) => {
              html += `
              <div class="conversation-turn">
                <span class="conversation-label conversation-label--request">Attacker prompt</span>
                <div class="conversation-bubble">${escapeHtml(turn.request.trim())}</div>
              </div>
              <div class="conversation-turn">
                <span class="conversation-label conversation-label--response">Model response</span>
                <div class="conversation-bubble">${escapeHtml(turn.response.trim())}</div>
              </div>`;
            });

            html += `
            </div>
          </div>`;
          }

          // Reasoning
          if (r.evidence && r.evidence.content) {
            const reason =
              typeof r.evidence.content === "string"
                ? r.evidence.content
                : r.evidence.content.reason ||
                  JSON.stringify(r.evidence.content, null, 2);

            html += `
          <div class="issue-card-section">
            <div class="issue-card-section-title">Reasoning</div>
            <div class="evidence-block">${escapeHtml(reason)}</div>
          </div>`;
          }

          html += `</div>`;
        });

        // ── Inject ──────────────────────────────────────────────────────
        root.innerHTML = html;
        initGroupByControl();

        // Wire up framework tag "+N" expand buttons
        document.querySelectorAll(".framework-tag-more").forEach((btn) => {
          btn.addEventListener("click", function () {
            const container = this.closest(".framework-tags");
            container
              .querySelectorAll(".framework-tag-hidden")
              .forEach((tag) => {
                tag.classList.remove("framework-tag-hidden");
              });
            this.remove();
          });
        });
      })();
    </script>
  </body>
</html>
