repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.16.1
    hooks:
      - id: gitleaks
        stages: [pre-commit]

  - repo: https://github.com/alessandrojcm/commitlint-pre-commit-hook
    rev: v9.24.0
    hooks:
      - id: commitlint
        stages: [commit-msg]
        additional_dependencies: ["@commitlint/config-conventional"]

  # TODO(pkey): re-enable format and lint hooks after upgrading golangci-lint to v2.
  # Currently v1.64.7 (built with go1.24) produces false typecheck errors on
  # dependencies that require go1.25. CI has dedicated lint/format jobs.
  - repo: local
    hooks:
    -   id: build-wizard
        name: Rebuild wizard dist if frontend changed
        entry: bash
        args:
        - -c
        - 'make build-wizard && git add internal/wizard/dist'
        language: system
        pass_filenames: false
        files: ^web/
